<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard - Smart Campus Attendance System using ML-Driven Face Recognition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome for icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f9fc;
        }

        header, footer {
            background: #003366;
            color: white;
            padding: 15px;
            text-align: center;
        }

        main {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #003366;
        }

        .success-popup {
            background-color: #dff0d8;
            color: #3c763d;
            border: 1px solid #c3e6cb;
            padding: 15px;
            margin: 20px 0;
            border-radius: 6px;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            background: #0059b3;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            margin: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        button:hover {
            background: #0073e6;
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Smart Campus Attendance System using ML-Driven Face Recognition</h1>
</header>

<main>
    <h2><i class="fas fa-user"></i> Welcome {{ name }}</h2>

    <!-- Popup message -->
    <div class="success-popup">
        <i class="fas fa-check-circle"></i> Your attendance has been marked successfully!
    </div>

    <a href="/user_attendance"><button><i class="fas fa-calendar-alt"></i> View Attendance History</button></a>
    <a href="/"><button><i class="fas fa-sign-out-alt"></i> Logout</button></a>
</main>

<footer>
    Smart Campus Attendance System using ML-Driven Face Recognition
</footer>

</body>
</html>
