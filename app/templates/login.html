<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Smart Campus Attendance System using ML-Driven Face Recognition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-image: url("{{ url_for('static', filename='images/1.jpg') }}");
        background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header, footer {
      background: rgba(0, 51, 102, 0.85);
      color: white;
      padding: 15px 30px;
      text-align: center;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
      animation: slideIn 1s ease forwards;
    }

    @keyframes slideIn {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #003366;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    input, select {
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-size: 1rem;
    }

    button {
      background-color: #003366;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0059b3;
    }

    footer {
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 20px;
        margin: 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Smart Campus Attendance System using ML-Driven Face Recognition</h1>
  </header>

  <main>
    <div class="login-container">
      <h2>Login Portal</h2>
      <form method="POST" action="/login">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" required />

        <label for="password">Password</label>
        <input type="password" name="password" id="password" required />

        <label for="role">Login As</label>
        <select name="role" id="role" required>
          <option value="" disabled selected>Select Role</option>
          <option value="admin">Admin</option>
          <option value="Student">Student</option>
          <option value="Faculty">Faculty</option>
        </select>

        <button type="submit">Login</button>
      </form>
    </div>
  </main>

  <footer>
    Smart Campus Attendance System using ML-Driven Face Recognition
  </footer>

</body>
</html>
