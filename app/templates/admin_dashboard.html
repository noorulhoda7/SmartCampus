<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Smart Campus Attendance System using ML-Driven Face Recognition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome CDN for icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
        }

        header, footer {
            background: #003366;
            color: white;
            padding: 15px;
            text-align: center;
        }

        main {
            padding: 30px;
            max-width: 800px;
            margin: auto;
        }

        h2 {
            color: #003366;
            text-align: center;
        }

        .dashboard-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            margin-bottom: 40px;
        }

        .dashboard-buttons a {
            text-decoration: none;
        }

        .dashboard-buttons button {
            background: #0059b3;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dashboard-buttons button:hover {
            background: #0073e6;
        }

        h3 {
            margin-top: 20px;
            color: #003366;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #ffffff;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-left: 5px solid #0059b3;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            margin-top: 50px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <header>
        <h1>Admin Dashboard</h1>
    </header>

    <main>
        <h2>Welcome Admin</h2>

        <div class="dashboard-buttons">
            <a href="/register"><button><i class="fas fa-user-plus"></i> Student & Faculty Registration</button></a>
            <a href="/train_model"><button><i class="fas fa-brain"></i> Train CNN Model</button></a>
            <a href="/view_attendance"><button><i class="fas fa-calendar-check"></i> View Attendance</button></a>
            <a href="/"><button><i class="fas fa-sign-out-alt"></i> Logout</button></a>
        </div>
        
        <h3><i class="fas fa-users"></i> Registered Students:</h3>
        <ul>
            {% for user in users %}
                <li><i class="fas fa-user"></i> {{ user[1] }} (ID: {{ user[0] }})</li>
            {% endfor %}
        </ul>
    </main>
        {% if request.args.get('trained') == 'yes' %}
        <script>
            alert("Model Trained Successfully!");
        </script>
        {% endif %}

    <footer>
        Smart Campus Attendance System using ML-Driven Face Recognition
    </footer>

</body>
</html>
